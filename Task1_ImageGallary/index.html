<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YCCE</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<h1>YCCE Gallery</h1>

<!-- Filter Buttons -->
<div class="filters">
  <button onclick="filterImages('all')">All</button>
  <button onclick="filterImages('Campus')">Campus</button>
  <button onclick="filterImages('Admin')">Admin</button>
  <button onclick="filterImages('Detail')">About</button>
</div>

<!-- Gallery -->
<div class="gallery">
  <img src="Images/logoo.png" onclick="openLightbox(this)">
  <img src="Images/Entrance.png" class="item Campus" onclick="openLightbox(this)">
  <img src="Images/Admin.png" class="item Admin" onclick="openLightbox(this)">
  <img src="Images/Campus.png" class="item Campus" onclick="openLightbox(this)">
  <img src="Images/SDM.png" class="item Campus" onclick="openLightbox(this)">
  <img src="Images/Detail.png" class="item Detail" onclick="openLightbox(this)">
</div>

<!-- Lightbox -->
<div id="lightbox">
  <span id="close" onclick="closeLightbox()">&times;</span>
  <img id="lightbox-img">
  
  <div class="nav">
    <button onclick="changeImage(-1)">Prev</button>
    <button onclick="changeImage(1)">Next</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
